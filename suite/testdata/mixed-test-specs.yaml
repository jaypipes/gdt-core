name: book CRUD
description: test lifecycle of a Book resource
require:
 - books_api
 - books_data
defaults:
  http:
    base_url: http://127.0.0.1:4000
  shell:
    user: notroot
tests:
 - name: no such book was found
   GET: /books/nosuchbook
   response:
     json:
       length: 0
     status: 404
 - name: invalid query parameter is supplied
   GET: /books?invalidparam=1
   response:
     json:
       length: 0
     status: 400
     strings:
       - invalid parameter
 - name: check unknown user cannot SSH to API server
   shell: ssh -T unknown@$books_api.ip
   fail: true
